# Verify that the Tauri build compiles cleanly across platforms.
#
# Policy: this project ships engine source only. Audio assets (assets/bgm,
# assets/se) are licence-restricted and are NOT redistributed by this repo
# or its CI. Therefore:
#   - No automatic release on tag push.
#   - No artifact upload (would expose binaries for download).
#   - Builds run with NEWDTW_NO_AUDIO=1 so staging works without audio.
#   - `--no-bundle` skips installer packaging (faster and avoids tempting
#     anyone to pick up and distribute the bundles).
#
# Manual `workflow_dispatch` is the only trigger — use it to confirm the
# Rust/JS side still compiles on a clean runner.
name: Tauri Build Check

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin --no-bundle
          - platform: ubuntu-22.04
            args: --no-bundle
          - platform: windows-latest
            args: --no-bundle

    runs-on: ${{ matrix.platform }}

    env:
      NEWDTW_NO_AUDIO: '1'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux Tauri dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Tauri build (verify only, no bundle, no audio)
        run: npx tauri build ${{ matrix.args }}
